version: "3.9"

services:
  api:
    build: .
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/app
    ports:
      - "18000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: .
    env_file: .env
    command: celery -A app.tasks.worker.celery_app worker -B -l info
    volumes:
      - ./:/app
    depends_on:
      - db
      - redis

  bot:
    build: .
    env_file: .env
    command: python -m app.bot.bot_app
    volumes:
      - ./:/app
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: prediction_scanner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - pg_data_local:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "16379:6379"

volumes:
  pg_data_local:
